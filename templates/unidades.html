{% extends "base.html" %}

{% block title %}Unidades Executoras - PATE{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3 class="text-center mb-0">🏥 Unidades Executoras</h3>
        </div>
        <div class="card-body">
            <div class="mb-3">
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalUnidade">
                    ➕ Nova Unidade
                </button>
                <button class="btn btn-info" onclick="carregarUnidades()">
                    🔄 Atualizar
                </button>
            </div>
            
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Nome</th>
                            <th>Município</th>
                            <th>CNES</th>
                            <th>CNPJ</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaUnidades">
                        <tr><td colspan="6" class="text-center"><span class="skeleton skeleton-text" style="width:40%"></span><\/td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal para Nova Unidade -->
<div class="modal fade" id="modalUnidade" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Nova Unidade Executora</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formUnidade">
                    <div class="mb-3">
                        <label>Nome da Unidade *</label>
                        <input type="text" id="nome_unidade" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Município *</label>
                        <input type="text" id="municipio_unidade" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>CNES</label>
                        <input type="text" id="cnes_unidade" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>CNPJ</label>
                        <input type="text" id="cnpj_unidade" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>Endereço</label>
                        <input type="text" id="endereco_unidade" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>Telefone</label>
                        <input type="text" id="telefone_unidade" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>Responsável</label>
                        <input type="text" id="responsavel_unidade" class="form-control">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="salvarUnidade()">Salvar</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal para Editar Unidade -->
<div class="modal fade" id="modalEditarUnidade" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-warning">
                <h5 class="modal-title">✏️ Editar Unidade Executora</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formEditarUnidade">
                    <input type="hidden" id="edit_unidade_id">
                    <div class="mb-3">
                        <label>Nome da Unidade *</label>
                        <input type="text" id="edit_nome_unidade" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Município *</label>
                        <input type="text" id="edit_municipio_unidade" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>CNES</label>
                        <input type="text" id="edit_cnes_unidade" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>CNPJ</label>
                        <input type="text" id="edit_cnpj_unidade" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>Endereço</label>
                        <input type="text" id="edit_endereco_unidade" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>Telefone</label>
                        <input type="text" id="edit_telefone_unidade" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>Responsável</label>
                        <input type="text" id="edit_responsavel_unidade" class="form-control">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-warning" onclick="atualizarUnidade()">Salvar Alterações</button>
            </div>
        </div>
    </div>
</div>

<script>
async function carregarUnidades() {
    try {
        const response = await fetch('/api/unidades/todas');
        const unidades = await response.json();
        
        const tbody = document.getElementById('tabelaUnidades');
        tbody.innerHTML = '';
        
        for (const unidade of unidades) {
            const row = tbody.insertRow();
            row.insertCell(0).textContent = unidade.nome;
            row.insertCell(1).textContent = unidade.municipio;
            row.insertCell(2).textContent = unidade.cnes || '-';
            row.insertCell(3).textContent = unidade.cnpj || '-';
            row.insertCell(4).innerHTML = unidade.ativa ? 
                '<span class="badge bg-success">Ativa</span>' : 
                '<span class="badge bg-danger">Inativa</span>';
            
            const acoes = row.insertCell(5);
            if (unidade.ativa) {
                acoes.innerHTML = `
                    <button class="btn btn-sm btn-warning me-1" onclick="abrirModalEditar('${unidade._id}')">
                        ✏️ Editar
                    </button>
                    <button class="btn btn-sm btn-danger" onclick="desativarUnidade('${unidade._id}')">
                        🗑️ Desativar
                    </button>
                `;
            } else {
                acoes.innerHTML = `
                    <button class="btn btn-sm btn-warning me-1" onclick="abrirModalEditar('${unidade._id}')">
                        ✏️ Editar
                    </button>
                    <button class="btn btn-sm btn-success" onclick="reativarUnidade('${unidade._id}')">
                        🔄 Reativar
                    </button>
                `;
            }
        }
    } catch (error) {
        console.error('Erro:', error);
        document.getElementById('tabelaUnidades').innerHTML = '<tr><td colspan="6" class="text-center text-danger">Erro ao carregar unidades</td></tr>';
    }
}

async function abrirModalEditar(unidadeId) {
    try {
        const response = await fetch(`/api/unidades/${unidadeId}`);
        const unidade = await response.json();
        
        document.getElementById('edit_unidade_id').value = unidade._id;
        document.getElementById('edit_nome_unidade').value = unidade.nome;
        document.getElementById('edit_municipio_unidade').value = unidade.municipio;
        document.getElementById('edit_cnes_unidade').value = unidade.cnes || '';
        document.getElementById('edit_cnpj_unidade').value = unidade.cnpj || '';
        document.getElementById('edit_endereco_unidade').value = unidade.endereco || '';
        document.getElementById('edit_telefone_unidade').value = unidade.telefone || '';
        document.getElementById('edit_responsavel_unidade').value = unidade.responsavel || '';
        
        new bootstrap.Modal(document.getElementById('modalEditarUnidade')).show();
    } catch (error) {
        console.error('Erro:', error);
        showToast('Erro ao carregar dados da unidade', 'error');
    }
}

async function atualizarUnidade() {
    const unidadeId = document.getElementById('edit_unidade_id').value;
    const dados = {
        nome: document.getElementById('edit_nome_unidade').value,
        municipio: document.getElementById('edit_municipio_unidade').value,
        cnes: document.getElementById('edit_cnes_unidade').value,
        cnpj: document.getElementById('edit_cnpj_unidade').value,
        endereco: document.getElementById('edit_endereco_unidade').value,
        telefone: document.getElementById('edit_telefone_unidade').value,
        responsavel: document.getElementById('edit_responsavel_unidade').value
    };
    
    if (!dados.nome || !dados.municipio) {
        showToast('Nome e Município são obrigatórios!', 'warning');
        return;
    }
    
    try {
        const response = await fetch(`/api/unidades/${unidadeId}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(dados)
        });
        
        const result = await response.json();
        
        if (response.ok) {
            showToast('Unidade atualizada com sucesso!', 'success');
            bootstrap.Modal.getInstance(document.getElementById('modalEditarUnidade')).hide();
            carregarUnidades();
        } else {
            showToast(result.erro, 'error');
        }
    } catch (error) {
        console.error('Erro:', error);
        showToast('Erro ao atualizar unidade', 'error');
    }
}

async function salvarUnidade() {
    const dados = {
        nome: document.getElementById('nome_unidade').value,
        municipio: document.getElementById('municipio_unidade').value,
        cnes: document.getElementById('cnes_unidade').value,
        cnpj: document.getElementById('cnpj_unidade').value,
        endereco: document.getElementById('endereco_unidade').value,
        telefone: document.getElementById('telefone_unidade').value,
        responsavel: document.getElementById('responsavel_unidade').value
    };
    
    if (!dados.nome || !dados.municipio) {
        showToast('Nome e Município são obrigatórios!', 'warning');
        return;
    }
    
    try {
        const response = await fetch('/api/unidades', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(dados)
        });
        
        const result = await response.json();
        
        if (response.ok) {
            showToast('Unidade criada com sucesso!', 'success');
            bootstrap.Modal.getInstance(document.getElementById('modalUnidade')).hide();
            document.getElementById('formUnidade').reset();
            carregarUnidades();
        } else {
            showToast(result.erro, 'error');
        }
    } catch (error) {
        console.error('Erro:', error);
        showToast('Erro ao salvar unidade', 'error');
    }
}

async function desativarUnidade(unidadeId) {
    if (confirm('Tem certeza que deseja desativar esta unidade?\n\nUnidades desativadas não aparecerão para os operadores.')) {
        try {
            const response = await fetch(`/api/unidades/${unidadeId}/desativar`, {
                method: 'DELETE'
            });
            
            const result = await response.json();
            
            if (response.ok) {
                showToast('Unidade desativada com sucesso!', 'success');
                carregarUnidades();
            } else {
                showToast(result.erro, 'error');
            }
        } catch (error) {
            console.error('Erro:', error);
        }
    }
}

async function reativarUnidade(unidadeId) {
    if (confirm('Tem certeza que deseja reativar esta unidade?\n\nUnidades reativadas aparecerão para os operadores.')) {
        try {
            const response = await fetch(`/api/unidades/${unidadeId}/reativar`, {
                method: 'PUT'
            });
            
            const result = await response.json();
            
            if (response.ok) {
                showToast('Unidade reativada com sucesso!', 'success');
                carregarUnidades();
            } else {
                showToast(result.erro, 'error');
            }
        } catch (error) {
            console.error('Erro:', error);
        }
    }
}

carregarUnidades();
</script>
{% endblock %}
