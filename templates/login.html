<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PATE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.85), rgba(118, 75, 162, 0.85)), url('{{ url_for("static", filename="videos/gif_login.gif") }}');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(5px);
            animation: fadeInUp 0.6s ease-out;
            margin: 20px;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h3 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .login-header p {
            color: #666;
        }
        
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            transition: all 0.3s;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-outline-custom {
            border: 1px solid #667eea;
            color: #667eea;
            background: transparent;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            transition: all 0.3s;
        }
        
        .btn-outline-custom:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
        }
        
        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #ddd;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .logo-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }
        
        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }
        
        .divider::before,
        .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #ddd;
        }
        
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .divider span {
            background: white;
            padding: 0 10px;
            color: #999;
            font-size: 14px;
        }
        
        .form-check-input:checked {
            background-color: #667eea;
            border-color: #667eea;
        }
        
        .forgot-link {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        
        .forgot-link:hover { text-decoration: underline; }
        
        .modal-content { border-radius: 15px; }
        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px 15px 0 0;
        }
        .modal-header .btn-close { filter: brightness(0) invert(1); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="logo-icon">🏥</div>
            <h3>PATE</h3>
            <p class="text-muted">Programa de Atendimento Terciário Especializado</p>
        </div>
        
        <form id="formLogin">
            <div class="mb-3">
                <label class="form-label">Usuário / Email</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="seu@email.com" autocomplete="username" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" id="senha" name="senha" class="form-control" placeholder="********" autocomplete="current-password" required>
            </div>
            <div class="mb-3 d-flex justify-content-between align-items-center">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">Lembrar-me</label>
                </div>
                <a href="#" class="forgot-link" data-bs-toggle="modal" data-bs-target="#modalEsqueciSenha">Esqueceu a senha?</a>
            </div>
            <button type="submit" class="btn btn-primary btn-login mb-3">🔓 ENTRAR</button>
        </form>
        
        <div class="divider"><span>ou</span></div>
        <button class="btn btn-outline-custom" data-bs-toggle="modal" data-bs-target="#modalRegistro">📝 REGISTRAR-SE</button>
        <div id="mensagem" class="mt-3"></div>
    </div>
    
    <!-- Modal Esqueci a Senha -->
    <div class="modal fade" id="modalEsqueciSenha" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">🔐 Recuperar Senha</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Digite seu email para receber as instruções de recuperação de senha.</p>
                    <form id="formRecuperar">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="email_recuperar" class="form-control" placeholder="seu@email.com" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Enviar Instruções</button>
                    </form>
                    <div id="msgRecuperar" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modal Registro -->
    <div class="modal fade" id="modalRegistro" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">📝 Registrar Novo Usuário</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formRegistro">
                        <div class="mb-3">
                            <label class="form-label">Nome Completo *</label>
                            <input type="text" id="reg_nome" class="form-control" placeholder="Digite seu nome" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email *</label>
                            <input type="email" id="reg_email" class="form-control" placeholder="seu@email.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Senha *</label>
                            <input type="password" id="reg_senha" class="form-control" placeholder="Mínimo 6 caracteres" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Confirmar Senha *</label>
                            <input type="password" id="reg_confirmar_senha" class="form-control" placeholder="Digite a senha novamente" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tipo de Usuário</label>
                            <select id="reg_tipo" class="form-control">
                                <option value="operador">Operador (Cadastro apenas)</option>
                                <option value="admin">Administrador (Acesso total)</option>
                            </select>
                            <small class="text-muted">Apenas administradores podem criar outros administradores</small>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Registrar</button>
                    </form>
                    <div id="msgRegistro" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Login
        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            const btn = document.querySelector('#formLogin button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '⏳ Entrando...';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, senha})
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    if (rememberMe) {
                        localStorage.setItem('rememberedEmail', email);
                    } else {
                        localStorage.removeItem('rememberedEmail');
                    }
                    window.location.href = '/';
                } else {
                    document.getElementById('mensagem').innerHTML = `<div class="alert alert-danger">❌ ${result.erro}</div>`;
                }
            } catch (error) {
                document.getElementById('mensagem').innerHTML = `<div class="alert alert-danger">❌ Erro ao conectar</div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🔓 ENTRAR';
            }
        });
        
        // Carregar email salvo
        const rememberedEmail = localStorage.getItem('rememberedEmail');
        if (rememberedEmail) {
            document.getElementById('email').value = rememberedEmail;
            document.getElementById('rememberMe').checked = true;
        }
        
        // Recuperar senha
        document.getElementById('formRecuperar').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email_recuperar').value;
            const btn = document.querySelector('#formRecuperar button');
            const msgDiv = document.getElementById('msgRecuperar');
            
            btn.disabled = true;
            btn.innerHTML = '⏳ Enviando...';
            
            try {
                const response = await fetch('/api/recuperar_senha', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email})
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    msgDiv.innerHTML = `<div class="alert alert-success">✅ ${result.mensagem}</div>`;
                    setTimeout(() => {
                        bootstrap.Modal.getInstance(document.getElementById('modalEsqueciSenha')).hide();
                        msgDiv.innerHTML = '';
                    }, 2000);
                } else {
                    msgDiv.innerHTML = `<div class="alert alert-danger">❌ ${result.erro}</div>`;
                }
            } catch (error) {
                msgDiv.innerHTML = `<div class="alert alert-danger">❌ Erro ao processar</div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Enviar Instruções';
            }
        });
        
        // Registro
        document.getElementById('formRegistro').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nome = document.getElementById('reg_nome').value;
            const email = document.getElementById('reg_email').value;
            const senha = document.getElementById('reg_senha').value;
            const confirmarSenha = document.getElementById('reg_confirmar_senha').value;
            const tipo = document.getElementById('reg_tipo').value;
            const msgDiv = document.getElementById('msgRegistro');
            
            if (senha !== confirmarSenha) {
                msgDiv.innerHTML = `<div class="alert alert-danger">❌ As senhas não coincidem</div>`;
                return;
            }
            
            if (senha.length < 6) {
                msgDiv.innerHTML = `<div class="alert alert-danger">❌ A senha deve ter pelo menos 6 caracteres</div>`;
                return;
            }
            
            const btn = document.querySelector('#formRegistro button');
            btn.disabled = true;
            btn.innerHTML = '⏳ Registrando...';
            
            try {
                const response = await fetch('/api/registro', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({nome, email, senha, tipo})
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    msgDiv.innerHTML = `<div class="alert alert-success">✅ ${result.mensagem}</div>`;
                    setTimeout(() => {
                        bootstrap.Modal.getInstance(document.getElementById('modalRegistro')).hide();
                        document.getElementById('formRegistro').reset();
                        msgDiv.innerHTML = '';
                    }, 2000);
                } else {
                    msgDiv.innerHTML = `<div class="alert alert-danger">❌ ${result.erro}</div>`;
                }
            } catch (error) {
                msgDiv.innerHTML = `<div class="alert alert-danger">❌ Erro ao registrar</div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Registrar';
            }
        });
    </script>
</body>
</html>
